# ─── Server ──────────────────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8003
  reload: true                  # set false in production

# ─── CORS ────────────────────────────────────────────────────────────
cors:
  allowed_origins:
    - "https://lumen-agent-phi.vercel.app"
    - "http://localhost:3000"    # Next.js dev server
    - "http://localhost:8003"    # frontend served by FastAPI
    - "http://0.0.0.0:8003"     # accessed via 0.0.0.0

# ─── Supabase Storage ────────────────────────────────────────────────
storage:
  bucket: "documents"           # Supabase Storage bucket name

# ─── Voice / VAD ─────────────────────────────────────────────────────
vad:
  barge_in_sensitivity: 0.05    # very sensitive for barge-in (0.0=most sensitive, 1.0=hard)
  silence_limit_chunks: 6       # chunks of silence before utterance ends (6 × 250ms = 1.5s)
  min_speech_chunks: 2          # minimum speech chunks to trigger pipeline

# ─── LLM ─────────────────────────────────────────────────────────────
llm:
  model: "gpt-4o"
  timeout_seconds: 10
  max_tokens: 500
  temperature: 0.7
  memory_model: "gpt-4o-mini"
  memory_max_tokens: 300
  memory_update_every: 10       # update long-term memory every N messages

# ─── Deepgram STT ────────────────────────────────────────────────────
stt:
  model: "nova-2"
  language: "en-US"
  timeout_seconds: 8

# ─── ElevenLabs TTS ──────────────────────────────────────────────────
tts:
  model_id: "eleven_turbo_v2_5"
  voice_id: "JBFqnCBsd6RMkjVDRZzb"   # override with ELEVENLABS_VOICE_ID env var
  output_format: "mp3_44100_128"
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true

# ─── WebSocket ───────────────────────────────────────────────────────
websocket:
  max_concurrent_users: 50

# ─── RAG ─────────────────────────────────────────────────────────────
rag:
  top_k: 3
  embedding_model: "text-embedding-3-small"
